<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>steam游戏中心</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}

html, body {
    background-color: #0b1023;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;
}

.nav {
    background-color: #121936;
    padding: 15px 0;
}
.nav-box {
    display: flex;
    align-items: center;
}
.logo {
    font-size: 22px;
    font-weight: bold;
    color: #60a5fa;
    margin-right: 30px;
}
.nav-menu a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 12px;
    font-size: 14px;
}
.nav-menu a:hover {
    color: #60a5fa;
}

.search-top {
    padding: 40px 0;
    text-align: center;
}
.search-top h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
}
.search-top p {
    color: #94a3b8;
    margin-bottom: 25px;
}
.search-input {
    width: 100%;
    max-width: 500px;
    height: 56px;
    border-radius: 30px;
    border: none;
    outline: none;
    padding: 0 24px;
    background: #1e294b;
    color: #fff;
    font-size: 16px;
}
.search-input::placeholder {
    color: #94a3b8;
}

.title-bar {
    font-size: 18px;
    border-left: 4px solid #60a5fa;
    padding-left: 12px;
    margin: 30px 0 15px;
}

.game-list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 50px;
}

.game-card {
    background: #121936;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
}
.game-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}
.game-card .info {
    padding: 12px;
}
.game-card h3 {
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.game-card p {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
}

.content-wrap {
    flex: 1;
}

.footer {
    background-color: #0b1023;
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 10px 0;
}

@media (max-width: 768px) {
    .game-list {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>
<body>

<div class="nav">
    <div class="container nav-box">
        <div class="logo">steam游戏中心</div>
        <div class="nav-menu">
            <a href="index.html">首页</a>
            <a href="game-spider.html?cate=单机游戏">单机游戏</a>
            <a href="game-spider.html?cate=互动游戏">互动游戏</a>
            <a href="#">常见问题</a>
        </div>
    </div>
</div>

<div class="content-wrap">
    <div class="search-top">
        <div class="container">
            <h1>欢迎来到steam游戏中心</h1>
            <p>全站免费游戏资源，无收费、无套路，记得收藏本站</p>
            <input type="text" class="search-input" placeholder="输入游戏名称搜索...">
        </div>
    </div>

    <div class="container">
        <h2 class="title-bar">最近更新</h2>
        <div class="game-list" id="gameList"></div>
    </div>
</div>

<div class="footer">
    Copyright © 2026 steam游戏中心 | 免费游戏资源分享站
</div>

<script>
async function loadGamesFromPage() {
    const res = await fetch("game-spider.html");
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, "text/html");
    const games = doc.querySelectorAll(".game-item");
    const list = document.getElementById("gameList");

    games.forEach(item => {
        const id = item.getAttribute("data-id");
        const img = item.getAttribute("data-img");
        const title = item.getAttribute("data-title");
        const size = item.getAttribute("data-size");
        const date = item.getAttribute("data-date");

        const card = document.createElement("div");
        card.className = "game-card";
        card.onclick = () => location.href = `game-spider.html?id=${id}`;
        card.innerHTML = `
            <img src="${img}" alt="${title}">
            <div class="info">
                <h3>${title}</h3>
                <p>${size} · ${date}</p>
            </div>
        `;
        list.appendChild(card);
    });
}

loadGamesFromPage();
</script>

</body>
</html>
