<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>steam游戏中心</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}

html, body {
    background-color: #0b1023;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;
}

.nav {
    background-color: #121936;
    padding: 15px 0;
}
.nav-box {
    display: flex;
    align-items: center;
}
.logo {
    font-size: 22px;
    font-weight: bold;
    color: #60a5fa;
    margin-right: 30px;
}
.nav-menu a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 12px;
    font-size: 14px;
}
.nav-menu a:hover {
    color: #60a5fa;
}

.search-top {
    padding: 60px 0;
    text-align: center;
}
.search-top h1 {
    font-size: 28px;
    margin-bottom: 15px;
    color: #fff;
}
.search-top p {
    color: #94a3b8;
    margin-bottom: 30px;
}
.search-input {
    width: 100%;
    max-width: 500px;
    height: 56px;
    border-radius: 30px;
    border: none;
    outline: none;
    padding: 0 24px;
    background: #1e294b;
    color: #fff;
    font-size: 16px;
}
.search-input::placeholder {
    color: #94a3b8;
}

/* 资源入口样式 */
.resource-section {
    text-align: center;
    margin: 40px 0;
}
.resource-btn {
    display: inline-block;
    background-color: #60a5fa;
    color: #fff;
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 16px;
    transition: background 0.2s;
}
.resource-btn:hover {
    background-color: #3b82f6;
}

.footer {
    background-color: #0b1023;
    color: #94a3b8;
    font-size: 13px;
    text-align: left;
    padding: 10px 0;
    margin-top: auto;
}
</style>
</head>
<body>

<div class="nav">
    <div class="container nav-box">
        <div class="logo">steam游戏中心</div>
        <div class="nav-menu">
            <a href="#">首页</a>
            <a href="#">单机游戏</a>
            <a href="#">互动游戏</a>
            <a href="#">常见问题</a>
        </div>
    </div>
</div>

<div class="content-wrap">
    <div class="search-top">
        <div class="container">
            <h1>欢迎来到steam游戏中心</h1>
            <p>全站免费游戏资源，无收费、无套路，记得收藏本站</p>
            <input type="text" class="search-input" placeholder="输入游戏名称搜索...">
        </div>
    </div>

    <div class="resource-section">
        <div class="container">
            <a href="https://你的资源仓库地址/或者你的游戏站地址" class="resource-btn">
                进入游戏资源库
            </a>
        </div>
    </div>
</div>

<div class="footer">
    Copyright © 2026 steam游戏中心 | 免费游戏资源分享站
</div>

</body>
</html>
