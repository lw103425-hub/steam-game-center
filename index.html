<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>steam游戏中心</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}

html, body {
    background-color: #0b1023;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;
}

.nav {
    background-color: #121936;
    padding: 15px 0;
}
.nav-box {
    display: flex;
    align-items: center;
}
.logo {
    font-size: 22px;
    font-weight: bold;
    color: #60a5fa;
    margin-right: 30px;
}
.nav-menu a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 12px;
    font-size: 14px;
}
.nav-menu a:hover {
    color: #60a5fa;
}

.search-top {
    padding: 40px 0;
    text-align: center;
}
.search-top h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
}
.search-top p {
    color: #94a3b8;
    margin-bottom: 25px;
}
/* 这里修改了搜索框样式，加大了高度和内边距 */
.search-input {
    width: 100%;
    max-width: 500px;
    height: 56px;
    border-radius: 30px;
    border: none;
    outline: none;
    padding: 0 24px;
    background: #1e294b;
    color: #fff;
    font-size: 16px;
}
.search-input::placeholder {
    color: #94a3b8;
}

.title-bar {
    font-size: 18px;
    border-left: 4px solid #60a5fa;
    padding-left: 12px;
    margin: 30px 0 15px;
}

.game-list {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 50px;
}

.game-card {
    background: #121936;
    border-radius: 8px;
    overflow: hidden;
    transition: 0.2s;
    cursor: pointer;
}
.game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px #253b7050;
}
.game-card img {
    width: 100%;
    height: 100px;
    object-fit: cover;
}
.game-card-text {
    padding: 8px;
}
.game-card-text h3 {
    font-size: 12px;
    font-weight: normal;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}
.game-card-text p {
    font-size: 10px;
    color: #94a3b8;
}

.content-wrap {
    flex: 1;
}

.footer {
    background-color: #0b1023;
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    padding: 10px 0;
}
</style>
</head>
<body>

<div class="nav">
    <div class="container nav-box">
        <div class="logo">steam游戏中心</div>
        <div class="nav-menu">
            <a href="#">首页</a>
            <a href="#">单机游戏</a>
            <a href="#">互动游戏</a>
            <a href="#">常见问题</a>
        </div>
    </div>
</div>

<div class="content-wrap">
    <div class="search-top">
        <div class="container">
            <h1>欢迎来到steam游戏中心</h1>
            <p>全站免费游戏资源，无收费、无套路，记得收藏本站</p>
            <input type="text" class="search-input" placeholder="输入游戏名称搜索...">
        </div>
    </div>

    <div class="container">
        <h2 class="title-bar">最近更新</h2>
        <div class="game-list">
            <div class="game-card" onclick="location.href='games/xxx.html'">
                <img src="images/xxx.jpg" alt="">
                <div class="game-card-text">
                    <h3>游戏名称在这里</h3>
                    <p>单机游戏 / 2026-05-31</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    Copyright © 2026 steam游戏中心 | 免费游戏资源分享站
</div>

</body>
</html>
