<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#0b1023;color:#fff;padding:20px}
.container{max-width:600px;margin:0 auto}
.back{color:#60a5fa;margin-bottom:20px;display:inline-block;text-decoration:none}
.game-item{background:#121936;padding:20px;border-radius:10px;margin-bottom:15px}
.game-item img{width:100%;border-radius:8px;margin-bottom:15px}
.game-item h2{font-size:18px;margin-bottom:8px}
.game-item p{color:#94a3b8;margin:4px 0}
.down{background:#60a5fa;color:#fff;padding:8px 16px;border-radius:6px;display:inline-block;margin-top:10px;text-decoration:none}
.game-item { display: none; }
</style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back">← 返回首页</a>

    <!-- 漫威蜘蛛侠 -->
    <div class="game-item"
         data-id="spider"
         data-img="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/fa103eb1ac93423faa12e811089de823.png"
         data-title="漫威蜘蛛侠：重制版"
         data-size="53.94GB"
         data-date="2026-01-19"
         data-cate="单机游戏">

        <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/fa103eb1ac93423faa12e811089de823.png" alt="漫威蜘蛛侠">
        <h2>漫威蜘蛛侠：重制版</h2>
        <p>大小：53.94GB</p>
        <p>更新：2026-01-19</p>
        <p>介绍：开放世界超级英雄冒险</p>
        <a href="https://pan.quark.cn/s/e176648ea3da" class="down">网盘下载</a>
    </div>

    <!-- GTA5 -->
    <div class="game-item"
         data-id="gta5"
         data-img="game2.jpg"
         data-title="GTA5 完整版"
         data-size="92GB"
         data-date="2026-06-01"
         data-cate="单机游戏">

        <img src="game2.jpg" alt="GTA5">
        <h2>GTA5 完整版</h2>
        <p>大小：92GB</p>
        <p>更新：2026-06-01</p>
        <p>介绍：经典开放世界游戏</p>
        <a href="网盘链接" class="down">网盘下载</a>
    </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const gameId = params.get('id');
const cateName = params.get('cate');

if (gameId) {
    document.querySelectorAll('.game-item').forEach(g => {
        if (g.dataset.id === gameId) g.style.display = 'block';
    });
} else if (cateName) {
    document.querySelectorAll('.game-item').forEach(g => {
        if (g.dataset.cate === cateName) g.style.display = 'block';
    });
} else {
    document.querySelectorAll('.game-item').forEach(g => g.style.display = 'block');
}
</script>

</body>
</html>
