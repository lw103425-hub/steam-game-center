<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#0b1023;color:#fff;padding:20px}
.container{max-width:600px;margin:0 auto}
.back{color:#60a5fa;margin-bottom:20px;display:inline-block;text-decoration:none}
.game-item{background:#121936;padding:20px;border-radius:10px;margin-bottom:15px}
.game-item img{width:100%;border-radius:8px;margin-bottom:15px}
.game-item h2{font-size:18px;margin-bottom:8px}
.game-item p{color:#94a3b8;margin:4px 0}
.down{background:#60a5fa;color:#fff;padding:8px 16px;border-radius:6px;display:inline-block;margin-top:10px;text-decoration:none}
.game-item { display: none; }
</style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back">← 返回首页</a>

    <!-- 只存数据，不显示内容 -->
    <div class="game-item"
         data-id="spider"
         data-img="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/fa103eb1ac93423faa12e811089de823.png"
         data-title="漫威蜘蛛侠：重制版"
         data-size="53.94GB"
         data-date="2026-01-19"
         data-cate="单机游戏">
    </div>

    <div class="game-item"
         data-id="gta5"
         data-img="game2.jpg"
         data-title="GTA5 完整版"
         data-size="92GB"
         data-date="2026-06-01"
         data-cate="单机游戏">
    </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const gameId = params.get('id');
const cateName = params.get('cate');
const container = document.querySelector('.container');

if (gameId) {
    const game = document.querySelector(`[data-id="${gameId}"]`);
    if (game) {
        container.innerHTML += `
        <div class="game-item" style="display:block;">
            <img src="${game.dataset.img}" alt="${game.dataset.title}">
            <h2>${game.dataset.title}</h2>
            <p>大小：${game.dataset.size}</p>
            <p>更新：${game.dataset.date}</p>
            <p>分类：${game.dataset.cate}</p>
        </div>
        `;
    }
} else if (cateName) {
    const games = document.querySelectorAll(`[data-cate="${cateName}"]`);
    games.forEach(g => {
        container.innerHTML += `
        <div class="game-item" style="display:block;">
            <img src="${g.dataset.img}" alt="${g.dataset.title}" style="height:180px">
            <h2>${g.dataset.title}</h2>
            <p>大小：${g.dataset.size}</p>
            <p>更新：${g.dataset.date}</p>
        </div>
        `;
    });
}
</script>
</body>
</html>
